<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,initial-scale=1">

<title>60会精算アプリ v6</title>

<link rel="manifest"
      href="manifest.webmanifest">

<meta name="theme-color"
      content="#1976d2">

<style>

body{
    font-family:sans-serif;
    max-width:1100px;
    margin:auto;
    padding:16px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}

input{
    width:95%;
    box-sizing:border-box;
}

button{
    padding:8px 12px;
    margin:4px;
}

textarea{
    width:100%;
    height:220px;
}

@media(max-width:700px){

    table{
        font-size:12px;
    }

    button{
        width:100%;
        margin-top:6px;
    }
}

</style>

</head>

<body>

<h1>60会精算アプリ v6</h1>

<p>

宿泊費総額

<input id="lodging"
       type="number"
       value="0">

</p>

<p>

酒代上限額

<input id="limit"
       type="number"
       value="2500">

</p>

<p>

丸め単位

<input id="unit"
       type="number"
       value="100">

</p>

<table id="tbl">

<thead>

<tr>

<th>幹事</th>

<th>氏名</th>

<th>酒代立替</th>

<th>つまみ代立替</th>

<th>削除</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

<button onclick="addRow()">

参加者追加

</button>

<button onclick="calc()">

精算する

</button>

<button onclick="copyLine()">

LINEコピー

</button>

<button onclick="csvOut()">

CSV出力

</button>

<button onclick="clearData()">

データクリア

</button>

<div id="result"></div>

<script>

const STORAGE_KEY="60kai_v6";

function addRow(
    name="",
    alcohol=0,
    snack=0,
    kanji=false
){

    const tr=
        document.createElement("tr");

    tr.innerHTML=`

    <td>

      <input
        type="radio"
        name="kanji"
        ${kanji?"checked":""}
      >

    </td>

    <td>

      <input
        value="${name}"
      >

    </td>

    <td>

      <input
        type="number"
        value="${alcohol}"
      >

    </td>

    <td>

      <input
        type="number"
        value="${snack}"
      >

    </td>

    <td>

      <button
        onclick="removeRow(this)"
      >

      削除

      </button>

    </td>
    `;

    tr.querySelectorAll("input")
      .forEach(i=>
        i.addEventListener(
            "input",
            save
        )
      );

    document
      .querySelector(
          "#tbl tbody"
      )
      .appendChild(tr);

    save();
}

function removeRow(btn){

    btn.closest("tr").remove();

    save();
}

function save(){

    const rows=[

        ...document.querySelectorAll(
            "#tbl tbody tr"
        )

    ].map(r=>({

        kanji:
            r.cells[0]
             .querySelector("input")
             .checked,

        name:
            r.cells[1]
             .querySelector("input")
             .value,

        alcohol:
            r.cells[2]
             .querySelector("input")
             .value,

        snack:
            r.cells[3]
             .querySelector("input")
             .value

    }));

    localStorage.setItem(

        STORAGE_KEY,

        JSON.stringify({

            lodging:
                lodging.value,

            limit:
                limit.value,

            unit:
                unit.value,

            rows

        })

    );
}

function load(){

    const d=

        JSON.parse(

            localStorage.getItem(
                STORAGE_KEY
            )

            ||

            "null"

        );

    if(!d){

        addRow(
            "幹事",
            0,
            0,
            true
        );

        addRow(
            "参加者",
            0,
            0,
            false
        );

        return;
    }

    lodging.value=
        d.lodging || 0;

    limit.value=
        d.limit || 2500;

    unit.value=
        d.unit || 100;

    d.rows.forEach(r=>{

        addRow(

            r.name,

            r.alcohol,

            r.snack,

            r.kanji

        );

    });

}

function ceilPay(v,u){

    return Math.ceil(v/u)*u;
}

function roundRecv(v,u){

    return Math.round(v/u)*u;
}
function calc(){

    const cap =
        Number(limit.value) || 2500;

    const roundUnit =
        Math.max(
            1,
            Number(unit.value) || 100
        );

    const lodgingTotal =
        Number(lodging.value) || 0;

    const members = [

        ...document.querySelectorAll(
            "#tbl tbody tr"
        )

    ].map(r=>({

        kanji:
            r.cells[0]
             .querySelector("input")
             .checked,

        name:
            r.cells[1]
             .querySelector("input")
             .value || "参加者",

        alcohol:
            Number(
                r.cells[2]
                 .querySelector("input")
                 .value
            ) || 0,

        snack:
            Number(
                r.cells[3]
                 .querySelector("input")
                 .value
            ) || 0

    }));


    if(members.length===0){

        alert("参加者がいません");

        return;
    }


    const count =
        members.length;


    const alcoholPool =
        members.reduce(
            (s,m)=>
                s +
                Math.min(
                    m.alcohol,
                    cap
                ),
            0
        );


    const selfAlcohol =
        members.reduce(
            (s,m)=>
                s +
                Math.max(
                    0,
                    m.alcohol-cap
                ),
            0
        );


    const snackPool =
        members.reduce(
            (s,m)=>
                s+m.snack,
            0
        );


    const burden =

        lodgingTotal/count +

        alcoholPool/count +

        snackPool/count;


    let result =

        members.map(m=>{

            const credit =

                Math.min(
                    m.alcohol,
                    cap
                )

                +

                m.snack;


            let net =
                burden-credit;


            if(net>=0){

                net =
                    ceilPay(
                        net,
                        roundUnit
                    );

            }
            else{

                net =
                    -roundRecv(
                        Math.abs(net),
                        roundUnit
                    );

            }

            return {

                ...m,

                net

            };

        });


    const totalPay =

        result
            .filter(r=>r.net>0)
            .reduce(
                (s,r)=>s+r.net,
                0
            );


    const totalRecv =

        result
            .filter(r=>r.net<0)
            .reduce(
                (s,r)=>
                    s+
                    Math.abs(r.net),
                0
            );


    const collected =

        totalPay-totalRecv;


    const excess =

        collected -
        lodgingTotal;


    const kanjiIndex =

        result.findIndex(
            r=>r.kanji
        );


    if(
        kanjiIndex>=0 &&
        excess>0
    ){

        result[
            kanjiIndex
        ].net -= excess;
    }


    let line =

        "【60会精算 v6】\n\n";


    let html =

        "<h2>精算結果</h2>" +

        "<table class='resultTable'>" +

        "<tr>" +

        "<th>氏名</th>" +

        "<th>結果</th>" +

        "</tr>";


    result.forEach(r=>{

        const txt =

            r.net>=0

            ?

            r.net.toLocaleString()
            +
            "円支払い"

            :

            Math.abs(
                r.net
            ).toLocaleString()
            +
            "円受取";


        html +=

            "<tr>" +

            "<td>" +

            r.name +

            (r.kanji
                ? "(幹事)"
                : "") +

            "</td>" +

            "<td>" +

            txt +

            "</td>" +

            "</tr>";


        line +=

            r.name +

            (r.kanji
                ? "(幹事)"
                : "") +

            "\n" +

            txt +

            "\n\n";

    });


    html +=

        "</table>";


    html +=

        "<p>宿泊費総額 : " +

        lodgingTotal
            .toLocaleString()

        +

        "円</p>";


    html +=

        "<p>酒代精算対象額 : " +

        alcoholPool
            .toLocaleString()

        +

        "円</p>";


    html +=

        "<p>酒代自己負担額 : " +

        selfAlcohol
            .toLocaleString()

        +

        "円</p>";


    html +=

        "<p>つまみ代総額 : " +

        snackPool
            .toLocaleString()

        +

        "円</p>";


    html +=

        "<textarea id='lineText'>"

        +

        line

        +

        "</textarea>";


    document
        .getElementById(
            "result"
        )
        .innerHTML = html;


    window.lineResult =
        line;


    save();
}



function copyLine(){

    const txt =

        window.lineResult || "";


    navigator.clipboard
        .writeText(txt)
        .then(()=>{

            alert(
                "LINE用テキストをコピーしました"
            );

        });

}



function csvOut(){

    const table =

        document.querySelector(
            ".resultTable"
        );


    if(!table){

        alert(
            "先に精算してください"
        );

        return;
    }


    const rows=[];


    rows.push([
        "氏名",
        "結果"
    ]);


    [...table.rows]
        .slice(1)
        .forEach(r=>{

            rows.push([

                r.cells[0]
                 .textContent,

                r.cells[1]
                 .textContent

            ]);

        });


    const csv =

        rows
            .map(
                r=>r.join(",")
            )
            .join("\n");


    const blob =

        new Blob(
            [csv],
            {
                type:
                "text/csv"
            }
        );


    const a =
        document.createElement(
            "a"
        );


    a.href =
        URL.createObjectURL(
            blob
        );


    a.download =
        "60kai_v6.csv";


    a.click();

}



function clearData(){

    if(
        !confirm(
            "保存データを削除しますか？"
        )
    ){
        return;
    }

    localStorage.removeItem(
        STORAGE_KEY
    );

    location.reload();
}



lodging.addEventListener(
    "input",
    save
);

limit.addEventListener(
    "input",
    save
);

unit.addEventListener(
    "input",
    save
);



if(
    "serviceWorker"
    in navigator
){

    navigator
        .serviceWorker
        .register(
            "./service-worker.js"
        );

}



load();

</script>

</body>
</html>
